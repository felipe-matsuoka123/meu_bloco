<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}evolucao.ai{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>
    <main class="page-shell">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script>
        function getPortugueseValidationMessage(field) {
            const validity = field.validity;
            if (validity.valueMissing) {
                return "Preencha este campo.";
            }
            if (validity.tooShort) {
                return `Use pelo menos ${field.minLength} caracteres.`;
            }
            if (validity.typeMismatch) {
                return "Preencha este campo em um formato valido.";
            }
            if (validity.patternMismatch) {
                return "Preencha este campo no formato esperado.";
            }
            if (validity.rangeUnderflow || validity.rangeOverflow) {
                return "Escolha um valor valido.";
            }
            if (validity.stepMismatch) {
                return "Escolha um valor permitido.";
            }
            return "";
        }

        document.addEventListener("DOMContentLoaded", () => {
            const fields = document.querySelectorAll("input, textarea, select");
            fields.forEach((field) => {
                field.addEventListener("invalid", () => {
                    field.setCustomValidity(getPortugueseValidationMessage(field));
                });
                field.addEventListener("input", () => {
                    field.setCustomValidity("");
                });
                field.addEventListener("change", () => {
                    field.setCustomValidity("");
                });
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
